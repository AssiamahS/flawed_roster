<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>dance</title>
  <style>
    html,body{margin:0;padding:0;background:#000;overflow:hidden}
    canvas{display:block}
  </style>
</head>
<body>
<script type="importmap">
{"imports":{"three":"https://esm.sh/three@0.160.0"}}
</script>
<script type="module">
import * as THREE from "three";

const W = 1080, H = 1920;

const scene = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H);
renderer.setPixelRatio(1);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(46, W / H, 0.1, 100);
camera.position.set(0, 2.3, 11);
camera.lookAt(0, 1.8, 0);

const shadowGeom = new THREE.CircleGeometry(1.1, 32);
const shadowMat = new THREE.MeshBasicMaterial({
  color: 0x000000,
  transparent: true,
  opacity: 0.38,
});
const shadow = new THREE.Mesh(shadowGeom, shadowMat);
shadow.rotation.x = -Math.PI / 2;
shadow.position.set(0, 0.015, 0);
scene.add(shadow);

async function loadBackground(url) {
  if (!url) return null;
  const loader = new THREE.TextureLoader();
  loader.setCrossOrigin("anonymous");
  const tex = await loader.loadAsync(url);
  tex.colorSpace = THREE.SRGBColorSpace;
  scene.background = tex;
  const face = await loader.loadAsync(url);
  face.colorSpace = THREE.SRGBColorSpace;
  return face;
}

function tube(length, radiusTop, radiusBot, color) {
  const g = new THREE.CylinderGeometry(radiusTop, radiusBot, length, 18, 1);
  const m = new THREE.MeshBasicMaterial({ color: new THREE.Color(color) });
  return new THREE.Mesh(g, m);
}

function ball(r, color) {
  return new THREE.Mesh(
    new THREE.SphereGeometry(r, 22, 16),
    new THREE.MeshBasicMaterial({ color: new THREE.Color(color) }),
  );
}

function torso(w, h, d, color) {
  const tg = new THREE.CylinderGeometry(w * 0.5, w * 0.42, h, 22, 1);
  const tm = new THREE.MeshBasicMaterial({ color: new THREE.Color(color) });
  return new THREE.Mesh(tg, tm);
}

function buildRig(color, faceTexture) {
  const joints = {};
  const skin = new THREE.Color(color);
  const neon = skin.clone().multiplyScalar(1.15);
  const joint = skin.clone().multiplyScalar(0.9);

  const hips = new THREE.Group(); hips.position.set(0, 2.6, 0); scene.add(hips); joints.Hips = hips;
  hips.add(ball(0.22, joint));

  const spine = new THREE.Group(); spine.position.set(0, 0.35, 0); hips.add(spine); joints.Spine = spine;
  const spineMesh = torso(0.65, 0.9, 0.45, neon); spineMesh.position.y = 0.45; spine.add(spineMesh);

  const head = new THREE.Group(); head.position.set(0, 1.05, 0); spine.add(head); joints.Head = head;
  head.add(ball(0.16, joint));
  if (faceTexture) {
    const faceMat = new THREE.MeshBasicMaterial({ map: faceTexture, transparent: true });
    const faceMesh = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 1.6), faceMat);
    faceMesh.position.y = 0.65;
    head.add(faceMesh);
    head.userData.billboard = faceMesh;
  } else {
    head.add(ball(0.55, neon));
  }

  const mkLimb = (parent, x, y, len, rTop, rBot) => {
    const upper = new THREE.Group(); upper.position.set(x, y, 0); parent.add(upper);
    upper.add(ball(rTop * 1.3, joint));
    const upperT = tube(len, rTop, rBot, neon); upperT.position.y = -len / 2; upper.add(upperT);
    const lower = new THREE.Group(); lower.position.set(0, -len, 0); upper.add(lower);
    lower.add(ball(rBot * 1.25, joint));
    const lowerT = tube(len, rBot, rBot * 0.85, neon); lowerT.position.y = -len / 2; lower.add(lowerT);
    lower.add(ball(rBot * 1.05, joint)).position.y = -len;
    return { upper, lower };
  };

  const la = mkLimb(spine, 0.4, 0.85, 0.6, 0.14, 0.11); joints.Left_Upper_Arm = la.upper; joints.Left_Lower_Arm = la.lower;
  const ra = mkLimb(spine, -0.4, 0.85, 0.6, 0.14, 0.11); joints.Right_Upper_Arm = ra.upper; joints.Right_Lower_Arm = ra.lower;
  const ll = mkLimb(hips, 0.2, -0.05, 0.8, 0.18, 0.14); joints.Left_Upper_Leg = ll.upper; joints.Left_Lower_Leg = ll.lower;
  const rl = mkLimb(hips, -0.2, -0.05, 0.8, 0.18, 0.14); joints.Right_Upper_Leg = rl.upper; joints.Right_Lower_Leg = rl.lower;

  return joints;
}

function sampleKeyframes(keyframes, t) {
  if (keyframes.length === 0) return null;
  if (t <= keyframes[0].time) return keyframes[0].pose;
  if (t >= keyframes[keyframes.length - 1].time) return keyframes[keyframes.length - 1].pose;
  let i = 0;
  while (i < keyframes.length - 1 && keyframes[i + 1].time < t) i++;
  const a = keyframes[i], b = keyframes[i + 1];
  const u = (t - a.time) / (b.time - a.time);
  const out = {};
  const names = new Set([...Object.keys(a.pose), ...Object.keys(b.pose)]);
  const tmpA = new THREE.Quaternion();
  const tmpB = new THREE.Quaternion();
  for (const name of names) {
    const pa = a.pose[name] ?? b.pose[name];
    const pb = b.pose[name] ?? a.pose[name];
    const pos = [
      pa.position[0] + (pb.position[0] - pa.position[0]) * u,
      pa.position[1] + (pb.position[1] - pa.position[1]) * u,
      pa.position[2] + (pb.position[2] - pa.position[2]) * u,
    ];
    tmpA.fromArray(pa.quaternion);
    tmpB.fromArray(pb.quaternion);
    tmpA.slerp(tmpB, u);
    out[name] = { position: pos, quaternion: [tmpA.x, tmpA.y, tmpA.z, tmpA.w] };
  }
  return out;
}

const POSE_AMPLIFY = 1.35;
const _tmpQ = new THREE.Quaternion();
const _identQ = new THREE.Quaternion();
const _faceWorldPos = new THREE.Vector3();

function applyPose(joints, pose) {
  for (const [rawName, transform] of Object.entries(pose)) {
    const name = rawName.replace(/_\d+$/, "");
    const j = joints[name];
    if (!j) continue;
    if (name === "Hips") {
      j.position.fromArray(transform.position);
      j.quaternion.fromArray(transform.quaternion);
    } else {
      _tmpQ.fromArray(transform.quaternion);
      _identQ.identity();
      _identQ.slerp(_tmpQ, POSE_AMPLIFY);
      j.quaternion.copy(_identQ);
    }
  }
}

let state = { joints: null, clip: null, duration: 0 };

window.__boot = async ({ animation, backgroundUrl, color }) => {
  const faceTex = await loadBackground(backgroundUrl).catch(() => null);
  state.joints = buildRig(color || "#5eead4", faceTex);
  state.clip = animation;
  state.duration = animation.keyframes[animation.keyframes.length - 1].time;
  window.__duration = state.duration;
  window.__ready = true;
};

window.__renderAt = (t) => {
  if (!state.clip) return;
  const looped = ((t % state.duration) + state.duration) % state.duration;
  const pose = sampleKeyframes(state.clip.keyframes, looped);
  if (pose) applyPose(state.joints, pose);
  if (state.joints?.Hips) {
    shadow.position.x = state.joints.Hips.position.x;
    shadow.position.z = state.joints.Hips.position.z;
  }
  if (state.joints?.Head?.userData?.billboard) {
    const face = state.joints.Head.userData.billboard;
    face.getWorldPosition(_faceWorldPos);
    face.lookAt(camera.position);
  }
  renderer.render(scene, camera);
};
</script>
</body>
