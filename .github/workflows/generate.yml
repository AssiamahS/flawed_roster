name: Generate Clip

on:
  workflow_dispatch:
    inputs:
      niche:
        description: "Niche profile (brainrot | beauty | supplements | pets)"
        required: true
        default: "brainrot"
        type: choice
        options:
          - brainrot
          - beauty
          - supplements
          - pets
      prompt:
        description: "Seed (leave blank for niche default)"
        required: false
        default: ""
  schedule:
    - cron: "0 */8 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NICHE: ${{ github.event.inputs.niche || 'brainrot' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install piper-tts + whisper
        run: pip install --quiet piper-tts openai-whisper

      - name: Download niche voice model
        run: |
          mkdir -p voices
          MODEL_URL=$(node -e "const c=require('./config/niches.json');console.log(c.profiles[process.env.NICHE].voice_model_url)")
          CONFIG_URL=$(node -e "const c=require('./config/niches.json');console.log(c.profiles[process.env.NICHE].voice_model_config_url)")
          MODEL_FILE=$(node -e "const c=require('./config/niches.json');console.log(c.profiles[process.env.NICHE].voice_model_file)")
          echo "Downloading $MODEL_URL"
          curl -sL -o "$MODEL_FILE" "$MODEL_URL"
          curl -sL -o "$MODEL_FILE.json" "$CONFIG_URL"

      - name: Generate
        run: node engine/pipeline.mjs "${{ github.event.inputs.prompt }}"

      - uses: actions/upload-artifact@v4
        with:
          name: clip-${{ github.run_id }}-${{ env.NICHE }}
          path: out/*.mp4
          retention-days: 30

      - name: Commit queue.json
        run: |
          git config user.name "flawed_roster-bot"
          git config user.email "bot@flawed-roster.local"
          git add docs/queue.json
          git diff --cached --quiet || git commit -m "queue: ${{ env.NICHE }} clip from run ${{ github.run_id }}"
          git push || true
