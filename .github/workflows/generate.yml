name: Generate Clip

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Chimera seed (animal + object)"
        required: true
        default: "pigeon fused with a cybertruck"
  schedule:
    - cron: "0 */8 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install piper-tts + italian voice model
        run: |
          pip install --quiet piper-tts
          mkdir -p voices
          BASE="https://huggingface.co/rhasspy/piper-voices/resolve/main/it/it_IT/riccardo/x_low"
          curl -sL -o voices/it_IT-riccardo-x_low.onnx "$BASE/it_IT-riccardo-x_low.onnx"
          curl -sL -o voices/it_IT-riccardo-x_low.onnx.json "$BASE/it_IT-riccardo-x_low.onnx.json"

      - name: Generate
        run: |
          PROMPT="${{ github.event.inputs.prompt || 'pigeon fused with a cybertruck' }}"
          node engine/pipeline.mjs "$PROMPT"

      - uses: actions/upload-artifact@v4
        with:
          name: clip-${{ github.run_id }}
          path: out/*.mp4
          retention-days: 30

      - name: Commit queue.json
        run: |
          git config user.name "flawed_roster-bot"
          git config user.email "bot@flawed-roster.local"
          git add docs/queue.json
          git diff --cached --quiet || git commit -m "queue: new clip from run ${{ github.run_id }}"
          git push || true
